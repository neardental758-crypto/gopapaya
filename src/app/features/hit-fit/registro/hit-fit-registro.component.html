<div class="min-h-screen bg-dark-950 p-6">
  <div class="max-w-4xl mx-auto">
    <div class="bg-dark-900 border border-dark-700 rounded-card p-6 mb-6">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-4">
          <button (click)="volver()" class="w-12 h-12 flex items-center justify-center bg-dark-700 hover:bg-dark-600 rounded-lg transition-all">
            <span class="text-2xl">←</span>
          </button>
          <div class="text-5xl">🥊</div>
          <img
            *ngIf="logoEmpresa"
            [src]="logoEmpresa"
            class="h-16 w-16 rounded-lg object-cover border-2 border-neon-green shadow-lg"
            [alt]="sesion?.nombreCliente || 'Logo'"
          />
          <div>
            <h1 class="text-3xl font-display font-bold text-white mb-1">
              Registro <span class="text-neon-green">Hit-Fit</span>
            </h1>
            <p class="text-gray-400">{{ sesion?.nombreCliente || 'Entrenamiento de alto impacto' }}</p>
          </div>
        </div>

        <div class="text-right">
          <span class="text-2xl font-bold text-neon-green">{{ totalParticipantesRegistrados }}</span>
          <p class="text-xs text-gray-500">Participantes</p>
        </div>
      </div>
    </div>

    <div class="bg-dark-900 border-2 border-neon-green rounded-card p-8">
      <h2 class="text-2xl font-display font-bold text-white mb-6 flex items-center gap-2">
        <span>👤</span> Datos del Participante
      </h2>

      <div class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-bold text-gray-300 mb-2">Nombre</label>
            <input
              type="text"
              [(ngModel)]="participanteActual.nombreParticipante"
              placeholder="Ingresa el nombre"
              class="w-full px-4 py-3 bg-dark-700 border-2 border-dark-600 rounded-lg focus:outline-none focus:border-neon-green transition-all text-white text-lg placeholder-gray-500"
            />
          </div>

          <div>
            <label class="block text-sm font-bold text-gray-300 mb-2">Apellido</label>
            <input
              type="text"
              [(ngModel)]="participanteActual.apellidoParticipante"
              placeholder="Ingresa el apellido"
              class="w-full px-4 py-3 bg-dark-700 border-2 border-dark-600 rounded-lg focus:outline-none focus:border-neon-green transition-all text-white text-lg placeholder-gray-500"
            />
          </div>
          <div>
          <label class="block text-sm font-bold text-gray-300 mb-2">Documento (Opcional)</label>
          <input
            type="text"
            [(ngModel)]="participanteActual.documento"
            placeholder="Ingresa el documento"
            class="w-full px-4 py-3 bg-dark-700 border-2 border-dark-600 rounded-lg focus:outline-none focus:border-neon-green transition-all text-white text-lg placeholder-gray-500"
          />
        </div>
        </div>

        <div>
          <label class="block text-sm font-bold text-gray-300 mb-3">Sexo</label>
          <div class="grid grid-cols-2 gap-4">
            <button
              (click)="participanteActual.sexo = 'M'"
              class="p-6 rounded-lg transition-all border-2"
              [class.bg-neon-blue]="participanteActual.sexo === 'M'"
              [class.border-neon-blue]="participanteActual.sexo === 'M'"
              [class.shadow-neon-blue]="participanteActual.sexo === 'M'"
              [class.bg-dark-700]="participanteActual.sexo !== 'M'"
              [class.border-dark-600]="participanteActual.sexo !== 'M'"
            >
              <div class="text-6xl mb-2" [class.text-dark-950]="participanteActual.sexo === 'M'" [class.text-white]="participanteActual.sexo !== 'M'">♂</div>
              <p class="font-bold text-lg" [class.text-dark-950]="participanteActual.sexo === 'M'" [class.text-gray-400]="participanteActual.sexo !== 'M'">Hombre</p>
            </button>
            <button
              (click)="participanteActual.sexo = 'F'"
              class="p-6 rounded-lg transition-all border-2"
              [class.bg-neon-pink]="participanteActual.sexo === 'F'"
              [class.border-neon-pink]="participanteActual.sexo === 'F'"
              [class.shadow-neon-pink]="participanteActual.sexo === 'F'"
              [class.bg-dark-700]="participanteActual.sexo !== 'F'"
              [class.border-dark-600]="participanteActual.sexo !== 'F'"
            >
              <div class="text-6xl mb-2" [class.text-dark-950]="participanteActual.sexo === 'F'" [class.text-white]="participanteActual.sexo !== 'F'">♀</div>
              <p class="font-bold text-lg" [class.text-dark-950]="participanteActual.sexo === 'F'" [class.text-gray-400]="participanteActual.sexo !== 'F'">Mujer</p>
            </button>
          </div>
        </div>
      </div>

      <div *ngIf="errorMessage" class="mt-6 bg-neon-red/10 border border-neon-red rounded-lg p-4">
        <p class="text-neon-red text-sm font-bold">⚠️ {{ errorMessage }}</p>
      </div>

<div class="mt-8 flex gap-4">
  <button
    (click)="volver()"
    class="flex-1 py-4 px-6 bg-dark-700 text-gray-300 rounded-lg font-bold hover:bg-dark-600 transition-all"
  >
    ← Atrás
  </button>
  <button
    (click)="registrarParticipante()"
    [disabled]="loading || !isFormValid()"
    class="flex-1 py-4 px-6 bg-neon-green text-dark-950 rounded-lg font-bold shadow-neon-green hover:shadow-neon-green-lg disabled:opacity-50 disabled:cursor-not-allowed transition-all"
  >
    <span *ngIf="!loading">Comenzar Hit-Fit 🥊</span>
    <span *ngIf="loading">Registrando...</span>
  </button>
</div>

<div *ngIf="totalParticipantesRegistrados > 0" class="mt-4">
  <button
    (click)="finalizarSesionDirecto()"
    class="w-full py-4 px-6 bg-neon-red text-white rounded-lg font-bold shadow-neon-red hover:shadow-neon-red-lg transition-all"
  >
    🏁 Finalizar Sesión Hit-Fit
  </button>
</div>
    </div>
  </div>
</div>
