<div class="min-h-screen bg-dark-950 flex items-center justify-center p-6 relative overflow-hidden">
  <div class="absolute inset-0 bg-gradient-to-br from-neon-blue/5 via-transparent to-neon-yellow/5"></div>

  <div *ngIf="!showCountdown && !showRaceAnimation" class="text-center z-10 animate-fadeIn">
    <div class="mb-8">
      <div class="inline-block p-8 bg-dark-900 rounded-card border-2 border-neon-blue shadow-neon-blue-lg animate-pulse-slow">
        <div class="text-8xl mb-4">🧠</div>
      </div>
    </div>

    <h1 class="text-5xl font-display font-bold text-white mb-4">
      <span class="text-neon-blue">Brain Bike</span>
    </h1>

    <div class="flex items-center justify-center gap-4">
      <div class="w-3 h-3 bg-neon-blue rounded-full animate-pulse"></div>
      <p class="text-lg font-body text-gray-500">Preparando la experiencia...</p>
      <div class="w-3 h-3 bg-neon-blue rounded-full animate-pulse"></div>
    </div>
  </div>

  <div *ngIf="showCountdown && !showRaceAnimation" class="text-center z-10 animate-fadeIn">
    <div class="relative mb-8">
      <div class="absolute inset-0 bg-neon-yellow/20 blur-3xl animate-glow"></div>

      <div class="relative">
        <div class="text-[200px] leading-none font-display font-bold text-neon-yellow drop-shadow-[0_0_50px_rgba(255,247,0,0.7)]">
          {{ countdown }}
        </div>
      </div>
    </div>

    <p class="text-3xl font-display font-bold text-white animate-pulse">
      ¡La competencia está por comenzar!
    </p>
  </div>

  <div *ngIf="showRaceAnimation" class="w-full h-full flex items-center justify-center z-10">
    <div class="w-full max-w-4xl relative">
      <div class="absolute inset-0 bg-gradient-to-r from-transparent via-neon-yellow/10 to-transparent animate-pulse"></div>

      <div class="relative space-y-8">
        <div class="relative h-32 bg-dark-900 border-y-4 border-neon-yellow/30 overflow-hidden">
          <div class="absolute top-0 right-0 w-full h-full flex items-center justify-center gap-32 animate-slideRoadReverse">
            <div class="w-24 h-1 bg-neon-yellow/50"></div>
            <div class="w-24 h-1 bg-neon-yellow/50"></div>
            <div class="w-24 h-1 bg-neon-yellow/50"></div>
            <div class="w-24 h-1 bg-neon-yellow/50"></div>
            <div class="w-24 h-1 bg-neon-yellow/50"></div>
            <div class="w-24 h-1 bg-neon-yellow/50"></div>
          </div>

          <div *ngFor="let participante of participantes; let i = index"
            class="absolute top-1/2 -translate-y-1/2 right-0 w-full"
            [style.top.%]="50 + (i * 8) - ((participantes.length - 1) * 4)">
            <div class="relative"
              [class.animate-bikeReverseFast]="i === 0"
              [class.animate-bikeReverseMedium]="i === 1"
              [class.animate-bikeReverseSlow]="i === 2"
              [style.animation]="i > 2 ? 'bikeReverseSlow ' + (4.5 + (i * 0.3)) + 's ease-in-out forwards' : ''">
              <div class="text-5xl"
                [style.filter]="'drop-shadow(0 0 20px ' + participante.colorBicicleta + ')'"
                [style.color]="participante.colorBicicleta">
                🚴‍♂️
              </div>
              <div *ngIf="i === 0" class="absolute -left-8 top-1/2 -translate-y-1/2 flex gap-2">
                <div class="w-8 h-1 animate-speedLineReverse"
                  [style.background-color]="participante.colorBicicleta + '60'"></div>
                <div class="w-6 h-1 animate-speedLineReverse [animation-delay:0.1s]"
                  [style.background-color]="participante.colorBicicleta + '40'"></div>
                <div class="w-4 h-1 animate-speedLineReverse [animation-delay:0.2s]"
                  [style.background-color]="participante.colorBicicleta + '20'"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="text-center relative animate-goText opacity-0 scale-50">
          <div class="absolute inset-0 bg-neon-yellow/30 blur-3xl"></div>
          <div class="relative">
            <div class="text-[180px] leading-none font-display font-bold text-neon-yellow drop-shadow-[0_0_60px_rgba(255,247,0,0.9)]">
              GO!
            </div>
            <div class="flex justify-center gap-8 mt-4">
              <div class="w-4 h-4 bg-neon-blue rounded-full animate-ping"></div>
              <div class="w-4 h-4 bg-neon-yellow rounded-full animate-ping [animation-delay:0.1s]"></div>
              <div class="w-4 h-4 bg-neon-red rounded-full animate-ping [animation-delay:0.2s]"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="absolute bottom-8 left-0 right-0 flex justify-center gap-2 px-4">
    <div *ngFor="let i of [1,2,3,4,5]"
      class="h-1 rounded-full transition-all duration-500"
      [class.w-12]="!showCountdown || countdown <= (6 - i) || showRaceAnimation"
      [class.w-4]="showCountdown && countdown > (6 - i) && !showRaceAnimation"
      [class.bg-neon-yellow]="!showCountdown || countdown <= (6 - i) || showRaceAnimation"
      [class.shadow-neon-yellow]="!showCountdown || countdown <= (6 - i) || showRaceAnimation"
      [class.bg-dark-700]="showCountdown && countdown > (6 - i) && !showRaceAnimation">
    </div>
  </div>
</div>
