<div
  *ngIf="isOpen"
  (click)="closeMenu()"
  class="fixed inset-0 bg-black/50 z-40 transition-opacity"
></div>

<div class="fixed bottom-6 right-6 z-50">
  <div
    *ngIf="isOpen"
    class="absolute bottom-20 right-0 bg-dark-900 border border-dark-700 rounded-card shadow-neon-yellow p-2 min-w-[200px] animate-fadeIn"
  >
    <button
      (click)="verCalendario()"
      class="w-full px-4 py-3 text-left text-white hover:bg-dark-800 rounded-lg transition-all flex items-center gap-3 group"
    >
      <span class="text-2xl group-hover:scale-110 transition-transform">📅</span>
      <span class="font-semibold">Calendario</span>
    </button>

    <button
      (click)="verReportes()"
      class="w-full px-4 py-3 text-left text-white hover:bg-dark-800 rounded-lg transition-all flex items-center gap-3 group"
    >
      <span class="text-2xl group-hover:scale-110 transition-transform">📊</span>
      <span class="font-semibold">Reportes</span>
    </button>

    <button
      (click)="verHistorial()"
      class="w-full px-4 py-3 text-left text-white hover:bg-dark-800 rounded-lg transition-all flex items-center gap-3 group"
    >
      <span class="text-2xl group-hover:scale-110 transition-transform">📜</span>
      <span class="font-semibold">Historial</span>
    </button>

    <div class="h-px bg-dark-700 my-2"></div>

    <button
      (click)="logout()"
      class="w-full px-4 py-3 text-left text-neon-red hover:bg-dark-800 rounded-lg transition-all flex items-center gap-3 group"
    >
      <span class="text-2xl group-hover:scale-110 transition-transform">🚪</span>
      <span class="font-semibold">Cerrar Sesión</span>
    </button>
  </div>

  <button
    (click)="toggleMenu()"
    class="w-16 h-16 bg-neon-yellow text-dark-950 rounded-full shadow-neon-yellow-lg hover:shadow-neon-yellow hover:scale-110 active:scale-95 transition-all flex items-center justify-center font-bold text-2xl"
    [class.rotate-45]="isOpen"
  >
    {{ isOpen ? '✕' : '☰' }}
  </button>
</div>
