<div class="min-h-screen bg-dark-950 p-6">
  <div class="max-w-7xl mx-auto space-y-6">
  <div class="bg-dark-900 border border-dark-700 rounded-card p-6">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-4">
        <button (click)="volver()" class="w-12 h-12 flex items-center justify-center bg-dark-700 hover:bg-dark-600 rounded-lg transition-all">
          <span class="text-2xl">←</span>
        </button>
        <div class="text-5xl">🥤</div>
        <img
          *ngIf="logoEmpresa"
          [src]="logoEmpresa"
          class="h-16 w-16 rounded-lg object-cover border-2 border-neon-orange shadow-neon-orange"
          [alt]="sesion?.nombreCliente || 'Logo'"
        />
        <div>
          <h1 class="text-3xl font-display font-bold text-white mb-1">
            Registro de <span class="text-neon-orange">Participantes</span>
          </h1>
          <p class="text-gray-400">{{ sesion?.nombreCliente || 'Bicilicuadora' }}</p>
        </div>
      </div>

      <div class="text-right">
        <span class="text-sm text-gray-400">{{ config?.numeroBicicletas }} Bicicletas</span>
      </div>
    </div>
  </div>

    <div class="bg-dark-900 border border-dark-700 rounded-card p-6">
      <h2 class="text-2xl font-display font-bold text-white mb-6">
        👥 Participantes
      </h2>

      <div *ngIf="modoEdicion && participantes.length > 0" class="mb-4 bg-neon-orange/10 border border-neon-orange/30 rounded-lg p-4">
        <p class="text-neon-orange text-sm font-bold mb-2">ℹ️ Ya hay participantes registrados para esta configuración</p>
        <button
          (click)="continuarConParticipantes()"
          class="px-4 py-2 bg-neon-orange text-dark-950 rounded-lg font-bold text-sm hover:scale-105 transition-all"
        >
          Continuar con estos participantes →
        </button>
      </div>

      <div class="space-y-4">
        <div
          *ngFor="let participante of participantes; let i = index"
          class="bg-dark-800 border-2 rounded-lg p-4 relative transition-all"
          [style.border-color]="participante.colorBicicleta"
          [style.box-shadow]="'0 0 10px ' + participante.colorBicicleta + '30'"
        >
          <div class="flex items-center gap-4">
            <div
              class="w-16 h-16 rounded-full flex items-center justify-center text-2xl font-bold font-display border-2 flex-shrink-0 transition-all"
              [style.background-color]="participante.colorBicicleta + '20'"
              [style.border-color]="participante.colorBicicleta"
              [style.color]="participante.colorBicicleta"
              [style.box-shadow]="'0 0 15px ' + participante.colorBicicleta + '40'"
            >
              {{ i + 1 }}
            </div>

            <div class="flex-1 min-w-0">
              <label class="block text-xs font-bold text-gray-400 mb-1 uppercase tracking-wide">
                Bicicleta {{ participante.numeroBicicleta }}
              </label>
              <input
                type="text"
                [(ngModel)]="participante.nombreParticipante"
                placeholder="Nombre completo del participante"
                class="w-full px-4 py-3 bg-dark-700 border border-dark-600 rounded-lg focus:outline-none focus:border-neon-orange focus:shadow-lg transition-all text-white placeholder-gray-500"
              />
            </div>

            <div class="flex items-center gap-3 flex-shrink-0">
              <button
                (click)="abrirSelectorSexo(i)"
                class="relative w-12 h-12 rounded-lg border-2 transition-all hover:scale-110 flex items-center justify-center text-2xl"
                [class.bg-neon-blue]="participante.sexo === 'M'"
                [class.bg-neon-pink]="participante.sexo === 'F'"
                [class.bg-dark-700]="!participante.sexo"
                [class.border-neon-blue]="participante.sexo === 'M'"
                [class.border-neon-pink]="participante.sexo === 'F'"
                [class.border-dark-600]="!participante.sexo"
                [style.box-shadow]="participante.sexo ? (participante.sexo === 'M' ? '0 0 15px rgba(0, 240, 255, 0.5)' : '0 0 15px rgba(255, 16, 240, 0.5)') : 'none'"
              >
                {{ participante.sexo === 'M' ? '♂' : participante.sexo === 'F' ? '♀' : '?' }}
              </button>
              <button
                (click)="abrirSelectorColor(i)"
                class="relative w-12 h-12 rounded-lg border-2 transition-all hover:scale-110"
                [style.background-color]="participante.colorBicicleta"
                [style.border-color]="participante.colorBicicleta"
                [style.box-shadow]="participanteSeleccionandoColor === i ? '0 0 25px ' + participante.colorBicicleta : '0 0 10px ' + participante.colorBicicleta + '50'"
              >
                <span class="sr-only">Seleccionar color</span>
              </button>
              <div class="text-4xl">🚴</div>
            </div>
          </div>

          <!-- Selector de Color -->
          <div
            *ngIf="participanteSeleccionandoColor === i"
            class="absolute z-10 right-4 top-full mt-2 bg-dark-850 border-2 border-dark-600 rounded-lg p-4 shadow-2xl animate-fadeIn"
            style="min-width: 300px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);"
          >
            <div class="flex items-center justify-between mb-3">
              <p class="text-sm font-bold text-white font-display uppercase tracking-wide">Selecciona el color</p>
              <button
                (click)="participanteSeleccionandoColor = null"
                class="w-6 h-6 flex items-center justify-center text-gray-400 hover:text-white hover:bg-dark-700 rounded transition-all"
              >
                ✕
              </button>
            </div>
            <div class="grid grid-cols-3 gap-3">
              <button
                *ngFor="let color of coloresDisponibles"
                (click)="seleccionarColor(i, color)"
                [disabled]="!isColorDisponible(color.valor, i)"
                class="group relative flex flex-col items-center gap-2 p-3 rounded-lg transition-all hover:bg-dark-700 disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:bg-transparent"
                [class.bg-dark-700]="participante.colorBicicleta === color.valor"
                [class.ring-2]="participante.colorBicicleta === color.valor"
                [style.ring-color]="participante.colorBicicleta === color.valor ? color.valor : ''"
              >
                <div
                  class="w-12 h-12 rounded-full border-2 transition-all"
                  [style.background-color]="color.valor"
                  [style.border-color]="color.valor"
                  [style.box-shadow]="participante.colorBicicleta === color.valor ? color.sombra : 'none'"
                  [class.scale-110]="participante.colorBicicleta === color.valor"
                ></div>
                <span
                  class="text-xs font-semibold transition-colors"
                  [class.text-white]="participante.colorBicicleta === color.valor"
                  [class.text-gray-400]="participante.colorBicicleta !== color.valor"
                >
                  {{ color.nombre }}
                </span>
                <div
                  *ngIf="participante.colorBicicleta === color.valor"
                  class="absolute -top-1 -right-1 w-6 h-6 bg-neon-green rounded-full flex items-center justify-center text-xs shadow-lg"
                  style="box-shadow: 0 0 15px rgba(57, 255, 20, 0.6);"
                >
                  ✓
                </div>
                <div
                  *ngIf="!isColorDisponible(color.valor, i) && participante.colorBicicleta !== color.valor"
                  class="absolute -top-1 -right-1 w-6 h-6 bg-neon-red rounded-full flex items-center justify-center text-xs shadow-lg"
                  style="box-shadow: 0 0 15px rgba(255, 0, 60, 0.6);"
                >
                  ✕
                </div>
              </button>
            </div>
          </div>

          <!-- Selector de Sexo -->
          <div
            *ngIf="participanteSeleccionandoSexo === i"
            class="absolute z-10 right-4 top-full mt-2 bg-dark-850 border-2 border-dark-600 rounded-lg p-4 shadow-2xl animate-fadeIn"
            style="min-width: 250px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);"
          >
            <div class="flex items-center justify-between mb-3">
              <p class="text-sm font-bold text-white font-display uppercase tracking-wide">Selecciona el sexo</p>
              <button
                (click)="participanteSeleccionandoSexo = null"
                class="w-6 h-6 flex items-center justify-center text-gray-400 hover:text-white hover:bg-dark-700 rounded transition-all"
              >
                ✕
              </button>
            </div>
            <div class="grid grid-cols-2 gap-3">
              <button
                (click)="seleccionarSexo(i, 'M')"
                class="flex flex-col items-center gap-2 p-4 rounded-lg transition-all hover:bg-dark-700 border-2"
                [class.bg-dark-700]="participante.sexo === 'M'"
                [class.border-neon-blue]="participante.sexo === 'M'"
                [class.border-transparent]="participante.sexo !== 'M'"
                [style.box-shadow]="participante.sexo === 'M' ? '0 0 15px rgba(0, 240, 255, 0.5)' : 'none'"
              >
                <div class="text-5xl" [class.text-neon-blue]="participante.sexo === 'M'" [class.text-white]="participante.sexo !== 'M'">♂</div>
                <span class="text-sm font-bold" [class.text-neon-blue]="participante.sexo === 'M'" [class.text-gray-400]="participante.sexo !== 'M'">Hombre</span>
                <div
                  *ngIf="participante.sexo === 'M'"
                  class="absolute -top-1 -right-1 w-6 h-6 bg-neon-green rounded-full flex items-center justify-center text-xs shadow-lg"
                  style="box-shadow: 0 0 15px rgba(57, 255, 20, 0.6);"
                >
                  ✓
                </div>
              </button>
              <button
                (click)="seleccionarSexo(i, 'F')"
                class="flex flex-col items-center gap-2 p-4 rounded-lg transition-all hover:bg-dark-700 border-2"
                [class.bg-dark-700]="participante.sexo === 'F'"
                [class.border-neon-pink]="participante.sexo === 'F'"
                [class.border-transparent]="participante.sexo !== 'F'"
                [style.box-shadow]="participante.sexo === 'F' ? '0 0 15px rgba(255, 16, 240, 0.5)' : 'none'"
              >
                <div class="text-5xl" [class.text-neon-pink]="participante.sexo === 'F'" [class.text-white]="participante.sexo !== 'F'">♀</div>
                <span class="text-sm font-bold" [class.text-neon-pink]="participante.sexo === 'F'" [class.text-gray-400]="participante.sexo !== 'F'">Mujer</span>
                <div
                  *ngIf="participante.sexo === 'F'"
                  class="absolute -top-1 -right-1 w-6 h-6 bg-neon-green rounded-full flex items-center justify-center text-xs shadow-lg"
                  style="box-shadow: 0 0 15px rgba(57, 255, 20, 0.6);"
                >
                  ✓
                </div>
              </button>
            </div>
          </div>
        </div>
      </div>

      <div *ngIf="errorMessage" class="mt-4 bg-neon-red/10 border border-neon-red/30 rounded-lg p-4 animate-fadeIn">
        <p class="text-neon-red text-sm font-bold">⚠️ {{ errorMessage }}</p>
      </div>

      <div class="mt-6 flex gap-4">
        <button
          (click)="volver()"
          class="flex-1 py-4 px-6 bg-dark-700 text-gray-300 rounded-lg font-bold font-display border border-dark-600 hover:bg-dark-600 hover:border-neon-orange transition-all"
        >
          ← Atrás
        </button>
        <button
          (click)="comenzarJuego()"
          [disabled]="loading || !isFormValid()"
          class="flex-1 py-4 px-6 bg-neon-orange text-dark-950 rounded-lg font-bold font-display shadow-lg hover:shadow-xl hover:scale-[1.02] disabled:opacity-50 disabled:cursor-not-allowed transition-all"
          style="box-shadow: 0 0 20px rgba(255, 107, 53, 0.3);"
        >
          <span *ngIf="!loading">Comenzar Juego 🎮</span>
          <span *ngIf="loading">Iniciando...</span>
        </button>
      </div>
    </div>
  </div>
</div>
