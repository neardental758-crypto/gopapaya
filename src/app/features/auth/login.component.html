<div class="min-h-screen bg-dark-950 flex items-center justify-center p-6 relative overflow-hidden">
  <div class="absolute inset-0 opacity-20">
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-neon-blue rounded-full blur-[120px]"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-neon-yellow rounded-full blur-[120px]"></div>
  </div>

  <div class="relative z-10 w-full max-w-md">
    <div class="bg-dark-800/80 backdrop-blur-xl rounded-card border border-dark-600 p-8 shadow-2xl">
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-20 h-20 bg-dark-700 rounded-2xl mb-4 border border-dark-600 shadow-neon-yellow">
          <span class="text-5xl">🎮</span>
        </div>
        <h1 class="text-4xl font-bold text-white mb-2 tracking-tight">
          Go <span class="text-neon-yellow">PAPAYA</span>
        </h1>
        <p class="text-gray-400 text-sm">Bienestar Experiencial & Eduentretenimiento</p>
      </div>

      <form (ngSubmit)="onSubmit()" class="space-y-5">
        <div *ngIf="errorMessage" class="bg-neon-red/10 border border-neon-red/30 rounded-lg p-4">
          <div class="flex items-center gap-3">
            <span class="text-neon-red text-xl">⚠️</span>
            <p class="text-sm text-neon-red">{{ errorMessage }}</p>
          </div>
        </div>

        <div class="space-y-2">
          <label class="block text-sm font-semibold text-gray-300">
            Correo Electrónico
          </label>
          <input
            type="email"
            [(ngModel)]="loginForm.email"
            name="email"
            class="w-full px-4 py-3 bg-dark-700 border border-dark-600 rounded-lg focus:border-neon-blue focus:ring-1 focus:ring-neon-blue focus:outline-none transition-all text-white placeholder-gray-500"
            placeholder="tu@email.com"
            required
          />
        </div>

        <div class="space-y-2">
          <label class="block text-sm font-semibold text-gray-300">
            Contraseña
          </label>
          <div class="relative">
            <input
              [type]="showPassword ? 'text' : 'password'"
              [(ngModel)]="loginForm.password"
              name="password"
              class="w-full px-4 py-3 bg-dark-700 border border-dark-600 rounded-lg focus:border-neon-blue focus:ring-1 focus:ring-neon-blue focus:outline-none transition-all text-white placeholder-gray-500"
              placeholder="••••••••"
              required
            />
            <button
              type="button"
              (click)="togglePassword()"
              class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-neon-blue transition-colors"
            >
              <span class="text-xl">{{ showPassword ? '👁️' : '👁️‍🗨️' }}</span>
            </button>
          </div>
        </div>

        <button
          type="submit"
          [disabled]="loading"
          class="w-full py-3 px-6 bg-neon-yellow text-dark-950 rounded-lg font-bold text-base shadow-neon-yellow hover:shadow-neon-yellow-lg hover:scale-[1.02] active:scale-[0.98] transition-all disabled:opacity-50 disabled:cursor-not-allowed"
        >
          <span *ngIf="!loading">Iniciar Sesión</span>
          <span *ngIf="loading" class="flex items-center justify-center gap-2">
            <svg class="animate-spin h-5 w-5" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Ingresando...
          </span>
        </button>
      </form>

      <div class="mt-6 pt-6 border-t border-dark-600">
        <p class="text-center text-sm text-gray-400">
          ¿Problemas para acceder?
          <a href="#" class="text-neon-blue hover:text-neon-blue/80 font-semibold transition-colors">Contacta soporte</a>
        </p>
      </div>
    </div>
  </div>
</div>
