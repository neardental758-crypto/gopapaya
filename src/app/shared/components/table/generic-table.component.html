<div class="bg-white rounded-lg shadow overflow-hidden">
  <table class="min-w-full divide-y divide-gray-200">
    <thead class="bg-gradient-to-r from-purple-600 to-indigo-600 text-white">
      <tr>
        <th *ngFor="let column of columns" class="px-6 py-3 text-left text-xs font-medium uppercase tracking-wider">
          {{ column.label }}
        </th>
        <th class="px-6 py-3 text-left text-xs font-medium uppercase tracking-wider">
          Acciones
        </th>
      </tr>
    </thead>
    <tbody class="bg-white divide-y divide-gray-200">
      <tr *ngFor="let item of data" class="hover:bg-gray-50 transition-colors">
        <td *ngFor="let column of columns" class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">
          {{ item[column.key] }}
        </td>
        <td class="px-6 py-4 whitespace-nowrap text-sm">
          <button (click)="onEdit.emit(item)" class="text-indigo-600 hover:text-indigo-900 mr-3">
            ✏️ Editar
          </button>
          <button (click)="onDelete.emit(item)" class="text-red-600 hover:text-red-900">
            🗑️ Eliminar
          </button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
