<div class="bg-dark-800 border border-dark-600 rounded-card p-6 mb-6">
  <h3 class="text-2xl font-display font-bold text-white mb-6">
    {{ isEditMode ? '✏️ Editar' : '➕ Nuevo' }} {{ title }}
  </h3>

  <form (ngSubmit)="handleSubmit()">
    <div *ngFor="let field of fields" class="mb-5">
      <label [for]="field.name" class="block text-sm font-bold text-gray-300 mb-2">
        {{ field.label }}
        <span *ngIf="field.required" class="text-neon-red">*</span>
      </label>

      <input
        *ngIf="field.type === 'text'"
        type="text"
        [id]="field.name"
        [name]="field.name"
        [(ngModel)]="formData[field.name]"
        [placeholder]="getPlaceholder(field)"
        [required]="!!field.required"
        class="w-full px-4 py-3 bg-dark-700 border border-dark-600 rounded-lg focus:outline-none focus:border-neon-blue focus:ring-1 focus:ring-neon-blue transition-all text-white placeholder-gray-500"
      />

      <input
        *ngIf="field.type === 'url'"
        type="url"
        [id]="field.name"
        [name]="field.name"
        [(ngModel)]="formData[field.name]"
        [placeholder]="getPlaceholder(field)"
        [required]="!!field.required"
        class="w-full px-4 py-3 bg-dark-700 border border-dark-600 rounded-lg focus:outline-none focus:border-neon-blue focus:ring-1 focus:ring-neon-blue transition-all text-white placeholder-gray-500"
      />

      <input
        *ngIf="field.type === 'number'"
        type="number"
        [id]="field.name"
        [name]="field.name"
        [(ngModel)]="formData[field.name]"
        [placeholder]="getPlaceholder(field)"
        [required]="!!field.required"
        step="any"
        class="w-full px-4 py-3 bg-dark-700 border border-dark-600 rounded-lg focus:outline-none focus:border-neon-blue focus:ring-1 focus:ring-neon-blue transition-all text-white placeholder-gray-500"
      />

      <textarea
        *ngIf="field.type === 'textarea'"
        [id]="field.name"
        [name]="field.name"
        [(ngModel)]="formData[field.name]"
        [placeholder]="getPlaceholder(field)"
        [required]="!!field.required"
        rows="4"
        class="w-full px-4 py-3 bg-dark-700 border border-dark-600 rounded-lg focus:outline-none focus:border-neon-blue focus:ring-1 focus:ring-neon-blue transition-all resize-none text-white placeholder-gray-500"
      ></textarea>

      <div *ngIf="(field.name === 'logo_tematica' || field.name === 'foto_bebida') && formData[field.name]" class="mt-3">
        <img
          [src]="formData[field.name]"
          alt="Preview"
          class="w-24 h-24 object-cover rounded-lg border border-dark-600"
        />
      </div>
    </div>

    <div class="flex justify-end gap-3 mt-8 pt-6 border-t border-dark-600">
      <button
        type="button"
        (click)="handleCancel()"
        class="px-6 py-3 bg-dark-700 text-gray-300 rounded-lg font-bold hover:bg-dark-600 border border-dark-600 transition-all"
      >
        Cancelar
      </button>
      <button
        type="submit"
        [disabled]="!isFormValid()"
        class="px-6 py-3 bg-neon-blue text-dark-950 rounded-lg font-bold shadow-neon-blue hover:shadow-neon-blue-lg disabled:opacity-50 disabled:cursor-not-allowed transition-all"
      >
        💾 {{ isEditMode ? 'Actualizar' : 'Guardar' }}
      </button>
    </div>
  </form>
</div>
