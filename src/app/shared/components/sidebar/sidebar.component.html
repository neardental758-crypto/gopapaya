<aside
  class="bg-dark-900 text-white transition-all duration-300 flex flex-col h-full border-r border-dark-700"
  [style.width]="isCollapsed ? '80px' : '256px'"
>
  <div class="p-6 border-b border-dark-700 h-20 flex items-center justify-center">
    <div class="flex items-center gap-3" [class.flex-col]="isCollapsed">
      <div class="w-10 h-10 bg-dark-700 rounded-lg flex items-center justify-center shadow-neon-yellow">
        <span class="text-2xl">🎮</span>
      </div>
      <span class="text-xl font-bold" *ngIf="!isCollapsed">
        Go <span class="text-neon-yellow">PAPAYA</span>
      </span>
    </div>
  </div>

  <nav class="flex-1 py-4 px-2 overflow-y-auto">
    <div *ngFor="let menuItem of menuItems">
      <div
        (click)="toggleSubMenu(menuItem)"
        [routerLink]="menuItem.route && !hasSubItems(menuItem) ? menuItem.route : null"
        [routerLinkActive]="!hasSubItems(menuItem) ? 'bg-dark-700 border-l-2 border-neon-yellow shadow-neon-yellow' : ''"
        class="flex items-center px-4 py-3 mx-2 mb-1 rounded-lg text-gray-300 hover:bg-dark-700 hover:text-white transition-all cursor-pointer"
        [class.gap-4]="!isCollapsed"
        [class.justify-center]="isCollapsed"
        [class.bg-dark-800]="menuItem.expanded && !isCollapsed"
      >
        <span class="text-xl">{{ menuItem.icon }}</span>
        <span *ngIf="!isCollapsed" class="flex-1 text-sm font-medium">{{ menuItem.label }}</span>
        <span
          *ngIf="!isCollapsed && hasSubItems(menuItem)"
          class="text-sm transition-transform text-neon-blue"
          [class.rotate-180]="menuItem.expanded"
        >
          ▼
        </span>
      </div>

      <div
        *ngIf="menuItem.expanded && !isCollapsed && hasSubItems(menuItem)"
        class="ml-4 mt-1 mb-2 space-y-1"
      >
      <a

          *ngFor="let subItem of menuItem.subItems"
          [routerLink]="subItem.route"
          routerLinkActive="bg-dark-700 border-l-2 border-neon-blue text-white"
          class="flex items-center px-4 py-2 mx-2 rounded-lg text-gray-400 hover:bg-dark-700 hover:text-white transition-all text-xs"
        >
          <span class="text-base mr-3">{{ subItem.icon }}</span>
          <span>{{ subItem.label }}</span>
        </a>
      </div>
    </div>
  </nav>

  <div class="p-4 border-t border-dark-700">
    <button
      (click)="toggleSidebar()"
      class="w-full py-2 px-4 bg-dark-800 hover:bg-dark-700 border border-dark-600 rounded-lg flex items-center justify-center gap-2 transition-all text-gray-300 hover:text-white"
    >
      <span class="text-lg">{{ isCollapsed ? '»' : '«' }}</span>
      <span *ngIf="!isCollapsed" class="text-xs font-medium">Contraer</span>
    </button>
  </div>
</aside>
